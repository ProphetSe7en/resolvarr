name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - feature/ui-overhaul
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registries after build'
        required: false
        default: true
        type: boolean

env:
  IMAGE_NAME: resolvarr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Promote to job env so we can reference it in `if:` conditions.
      # The secrets context is unavailable to the workflow validator, causing
      # "Unrecognized named-value: 'secrets'" if used directly in `if:`.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU (for multi-arch arm64 builds)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only runs when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are configured.
      # Forks without Docker Hub credentials skip this step gracefully.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ env.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=preview,enable=${{ github.ref == 'refs/heads/feature/ui-overhaul' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc') }}
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Determine version
        id: version
        run: |
          # Use the version baked into the Dockerfile (ARG VERSION=...)
          # so user-visible "vX.Y.Z-dev" matches CHANGELOG / README. Append
          # short SHA on main-pushes so testers can pin a bug to the exact
          # build (visible in the UI header + Settings → About + startup log).
          DOCKER_VERSION=$(grep '^ARG VERSION=' Dockerfile | head -1 | cut -d= -f2)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "value=${DOCKER_VERSION}+sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image }}
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
